<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Don't say the same thing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <!-- Setup screen -->
    <section id="setup-screen" class="screen">
      <header class="header">
        <h1>Don't say the same thing</h1>
        <p class="subtitle">Game host setup</p>
      </header>

      <div class="card">
        <label class="field-label" for="player-count">Number of players</label>
        <div class="slider-row">
          <input type="range" id="player-count" min="2" max="12" value="4" step="1" />
          <span id="player-count-out" class="slider-value">4</span>
        </div>
      </div>

      <div class="card">
        <label class="field-label">Questions</label>
        <div class="upload-row">
          <label for="json-upload" class="upload-btn">
            <span class="icon">⬆</span> Load .json file
          </label>
          <input type="file" id="json-upload" accept=".json,application/json" hidden />
        </div>
        <p id="upload-status" class="status">Using 3 default questions</p>
      </div>

      <button id="start-btn" class="btn-primary">
        Start game →
      </button>

      <p class="hint">Only you see this screen. Read questions out loud to the players.</p>
    </section>

    <!-- Game screen -->
    <section id="game-screen" class="screen hidden">
      <header class="game-header">
        <span class="meta">👥 <span id="player-display">4</span> players</span>
        <span class="meta">Question <span id="q-current">1</span> / <span id="q-total">3</span></span>
      </header>

      <div class="card question-card">
        <p class="field-label">Question</p>
        <p id="question-text" class="question-text"></p>

        <p class="field-label">Your answer (private)</p>
        <input id="answer-input" type="text" placeholder="Type your answer..." autocomplete="off" />
      </div>

      <div class="nav-row">
        <button id="prev-btn" class="btn-secondary">← Previous</button>
        <button id="next-btn" class="btn-secondary">Next →</button>
      </div>

      <div class="actions-row">
        <button id="export-btn" class="btn-tertiary">⬇ Export answers</button>
        <button id="reset-btn" class="btn-tertiary">↺ New game</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
