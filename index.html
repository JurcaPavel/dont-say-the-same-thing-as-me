<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Don't say the same thing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <!-- Setup screen -->
    <section id="setup-screen" class="screen">
      <header class="header">
        <h1>Don't say the same thing as me</h1>
        <p class="subtitle">Game host setup</p>
      </header>

      <div class="card">
        <label class="field-label" for="player-count">Number of players</label>
        <div class="slider-row">
          <input type="range" id="player-count" min="2" max="12" value="4" step="1" />
          <span id="player-count-out" class="slider-value">4</span>
        </div>
      </div>

      <div class="card">
        <label class="field-label">Category</label>
        <div class="category-grid category-grid-3" id="category-grid">
          <button class="btn-category active" data-category="all">All</button>
          <button class="btn-category" data-category="general">General</button>
          <button class="btn-category" data-category="geography">Geography</button>
          <button class="btn-category" data-category="historical">Historical</button>
          <button class="btn-category" data-category="art">Art</button>
          <button class="btn-category" data-category="food">Food</button>
          <button class="btn-category" data-category="animals">Animals</button>
          <button class="btn-category" data-category="sports">Sports</button>
          <button class="btn-category" data-category="science">Science</button>
          <button class="btn-category" data-category="popculture">Pop Culture</button>
          <button class="btn-category" data-category="anatomy">Anatomy</button>
          <button class="btn-category" data-category="brands">Brands</button>
          <button class="btn-category" data-category="music">Music</button>
          <button class="btn-category" data-category="travel">Travel</button>
        </div>

        <label class="field-label field-label-mt">Difficulty</label>
        <div class="category-grid" id="difficulty-grid">
          <button class="btn-category active" data-difficulty="easy">Easy</button>
          <button class="btn-category" data-difficulty="normal">Normal</button>
          <button class="btn-category" data-difficulty="hard">Hard</button>
          <button class="btn-category" data-difficulty="eliminating">Eliminating</button>
        </div>

        <p id="upload-status" class="status">Loading questions…</p>
      </div>

      <button id="start-btn" class="btn-primary">
        Start game →
      </button>

      <p class="hint">Only you see this screen. Read questions out loud to the players.</p>
    </section>

    <!-- Game screen -->
    <section id="game-screen" class="screen hidden">
      <header class="game-header">
        <span class="meta">👥 <span id="player-display">4</span> players <button id="eliminate-btn" class="btn-eliminate">− Eliminate</button></span>
        <span class="meta">Question <input id="q-jump" class="q-jump" type="number" min="1" inputmode="numeric" title="Type a number and press Enter to jump" /> / <span id="q-total">3</span> · <span id="game-meta-label" class="category-label"></span></span>
      </header>

      <div class="card question-card">
        <p class="field-label">Question</p>
        <p id="question-text" class="question-text"></p>
        <p id="question-text-cs" class="question-text-cs"></p>

        <p class="field-label">Your answer (private)</p>
        <input id="answer-input" type="text" placeholder="Type your answer..." autocomplete="off" />
      </div>

      <div class="nav-row">
        <button id="prev-btn" class="btn-secondary">← Previous</button>
        <button id="next-btn" class="btn-secondary">Next →</button>
      </div>

      <div class="actions-row">
        <button id="export-btn" class="btn-tertiary">⬇ Export answers</button>
        <button id="reset-btn" class="btn-tertiary">↺ New game</button>
      </div>
    </section>
  </main>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
